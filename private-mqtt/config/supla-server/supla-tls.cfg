[GLOBAL]
user = root
group = root

[NET]
tcp_enabled = 1
tcp_port = 2015
ssl_enabled = 1
ssl_port = 2016
cert = /etc/supla-server/ssl/server.crt
private_key = /etc/supla-server/ssl/server.key

[MySQL]
host = supla-db
port = 3306
database = supla
user = supla
password = CHANGE_ME_DB_PASSWORD

[IPC]
socket_path = /var/run/supla/supla-server-ctrl.sock

[OAUTH]
url = https://YOUR_DOMAIN_OR_PUBLIC_IP
access_token_lifetime = 300

[MQTT-BROKER]
enabled = 1
host = mosquitto
port = 8883
username = supla
password = CHANGE_ME_MQTT_PASSWORD
prefix =
ssl = 1
client_id = supla-server
CFG_MQTT_KEEP_ALIVE_SEC = 30
