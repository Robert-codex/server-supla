      - ../cloud-local/supla-cloud/var/admin_panel_audit.log:/var/www/cloud/var/admin_panel_audit.log
      - ../cloud-local/supla-cloud/var/admin_panel_attempts.json:/var/www/cloud/var/admin_panel_attempts.json
      - ../cloud-local/supla-cloud/var/admin_backup_schedule.json:/var/www/cloud/var/admin_backup_schedule.json
      - ../cloud-local/supla-cloud/var/backups:/var/www/cloud/var/backups
