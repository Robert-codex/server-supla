services:
  supla-cloud:
    container_name: ${COMPOSE_PROJECT_NAME}-cloud
    restart: unless-stopped
    image: supla/supla-cloud:${SUPLA_CLOUD_VERSION:-latest}
    env_file:
      - .env
    environment:
      MQTT_BROKER_INTEGRATED_AUTH: true
      MQTT_BROKER_PROTOCOL: mqtts
      MQTT_BROKER_PORT: 8883
      MQTT_BROKER_TLS: true
    volumes:
      - ./ssl/cloud:/etc/apache2/ssl
      - ${VOLUME_DATA}/cloud-local:/var/www/cloud/var/local
      - ${VOLUME_DATA}/cloud-logs:/var/www/cloud/var/logs
      - supla-server-socket:/supla-server
    ports:
      - "${PORT_HTTP}:80"
      - "${PORT_HTTPS}:443"
    logging:
      driver: json-file
      options:
        max-size: 50m
    depends_on:
      - supla-db
    networks:
      - mqtt-db-auth

  supla-db:
    container_name: ${COMPOSE_PROJECT_NAME}-db
    restart: unless-stopped
    image: ${DB_IMAGE}
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: supla
      MYSQL_USER: supla
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${VOLUME_DATA}/mysql:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: 50m
    networks:
      - mqtt-db-auth

  supla-server:
    container_name: ${COMPOSE_PROJECT_NAME}-server
    restart: unless-stopped
    image: supla/supla-server:${SUPLA_SERVER_VERSION:-latest}
    env_file:
      - .env
    environment:
      MQTT_BROKER_PROTOCOL: mqtts
      MQTT_BROKER_PORT: 8883
      MQTT_BROKER_TLS: true
    volumes:
      - ./ssl/server:/etc/supla-server/ssl
      - supla-server-socket:/var/run/supla
    ports:
      - "2015:2015"
      - "2016:2016"
    logging:
      driver: json-file
      options:
        max-size: 50m
    depends_on:
      - supla-cloud
      - mosquitto
    networks:
      - mqtt-db-auth

  mqtt-auth:
    container_name: ${COMPOSE_PROJECT_NAME}-mqtt-auth
    restart: unless-stopped
    build:
      context: ./auth-service
    environment:
      MQTT_BROKER_USERNAME: ${MQTT_BROKER_USERNAME}
      MQTT_BROKER_PASSWORD: ${MQTT_BROKER_PASSWORD}
      SUPLA_DB_HOST: supla-db
      SUPLA_DB_PORT: 3306
      SUPLA_DB_NAME: supla
      SUPLA_DB_USER: supla
      SUPLA_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - supla-db
    logging:
      driver: json-file
      options:
        max-size: 50m
    networks:
      - mqtt-db-auth

  mosquitto:
    container_name: ${COMPOSE_PROJECT_NAME}-mosquitto
    restart: unless-stopped
    image: iegomez/mosquitto-go-auth:2.1.0-mosquitto_2.0.15
    env_file:
      - .env
    environment:
      SUPLA_DB_HOST: supla-db
      SUPLA_DB_PORT: 3306
      SUPLA_DB_NAME: supla
      SUPLA_DB_USER: supla
      SUPLA_DB_PASSWORD: ${DB_PASSWORD}
    command:
      - /bin/sh
      - /usr/local/bin/start-db-auth.sh
    ports:
      - "${MQTT_TLS_PORT}:8883"
    volumes:
      - ./config/mosquitto-go-auth/mosquitto-tls.conf:/etc/mosquitto/mosquitto.conf:ro
      - ./config/mosquitto-go-auth/go-auth-http.conf:/usr/local/share/go-auth.conf.tpl:ro
      - ./config/mosquitto-go-auth/start-db-auth.sh:/usr/local/bin/start-db-auth.sh:ro
      - ./ssl/mqtt:/mosquitto/certs:ro
      - ${VOLUME_DATA}/mosquitto/data:/mosquitto/data
      - ${VOLUME_DATA}/mosquitto/log:/mosquitto/log
    logging:
      driver: json-file
      options:
        max-size: 50m
    networks:
      - mqtt-db-auth

volumes:
  supla-server-socket: {}

networks:
  mqtt-db-auth: {}
