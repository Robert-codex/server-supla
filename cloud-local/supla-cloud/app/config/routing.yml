oauthAuthorize:
  resource: "@SuplaBundle/Controller/OAuth"
  type: annotation

supla_admin:
  resource: "@SuplaBundle/Controller/AdminUsersController.php"
  type: annotation

supla_admin_auth:
  resource: "@SuplaBundle/Controller/AdminAuthController.php"
  type: annotation

supla_admin_account:
  resource: "@SuplaBundle/Controller/AdminAccountController.php"
  type: annotation

supla_admin_system_health:
  resource: "@SuplaBundle/Controller/AdminSystemHealthController.php"
  type: annotation

supla_admin_backup:
  resource: "@SuplaBundle/Controller/AdminBackupController.php"
  type: annotation

supla_admin_backup_scheduler:
  resource: "@SuplaBundle/Controller/AdminBackupSchedulerController.php"
  type: annotation

supla_default:
  resource: "@SuplaBundle/Controller/DefaultController.php"
  type: annotation

directLinksExecutore:
  resource: "@SuplaBundle/Controller/ExecuteDirectLinkController.php"
  type: annotation

supla_api:
  type: annotation
  prefix: /api/{version}
  resource: "@SuplaBundle/Controller/Api"
  name_prefix: api_
  defaults: {_format: json}

supla_api_default:
  type: annotation
  prefix: /api
  resource: "@SuplaBundle/Controller/Api"
  name_prefix: api_default_
  defaults: {_format: json}
